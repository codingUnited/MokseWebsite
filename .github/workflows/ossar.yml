# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# This workflow integrates a collection of open source static analysis tools
# with GitHub code scanning. For documentation, or to provide feedback, visit
# https://github.com/github/ossar-action
name: OSSAR

on:
  push:
    branches: [ "master" ]
  schedule:
    - cron: '43 21 * * 3'

permissions:
  contents: read
  security-events: write

jobs:
  OSSAR-Scan:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9bb56186c3b09b4f86b1c65136769dd318469633 # v4.1.7

      # Microsoft Security DevOps (`microsoft/security-devops-action`) runs on GitHub-hosted runners
      # without requiring the deprecated Microsoft Security Code Analysis CLI or .NET Core 3.1.x.
      # If you are using self-hosted runners, refer to the MSDO action documentation for any
      # current runtime requirements and install only supported .NET versions if needed:
      # https://github.com/microsoft/security-devops-action

      # Run Microsoft Security DevOps CLI
      - name: Run Microsoft Security DevOps
        uses: microsoft/security-devops-action@08976cb623803b1b36d7112d4ff9f59eae704de0 # v1.12.0
        id: msdo
        continue-on-error: true

      # Run open source static analysis tools
      - name: Run OSSAR
        uses: github/ossar-action@b0197a0864d7095a2c2bb7d1cf8e17826dfec353 # v1
        id: ossar

      # Upload MSDO results to the Security tab
      - name: Upload MSDO results
        uses: github/codeql-action/upload-sarif@e5f05b81d5b6ff8cfa111c80c22c5fd02a384118 # v3
        with:
          sarif_file: ${{ steps.msdo.outputs.sarifFile }}
        if: steps.msdo.outputs.sarifFile

      # Upload OSSAR results to the Security tab
      - name: Upload OSSAR results
        uses: github/codeql-action/upload-sarif@e5f05b81d5b6ff8cfa111c80c22c5fd02a384118 # v3
        with:
          sarif_file: ${{ steps.ossar.outputs.sarifFile }}
